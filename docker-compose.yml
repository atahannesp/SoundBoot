services:
  db:
    image: postgres:15-alpine
    container_name: soundboot-db
    environment:
      POSTGRES_DB: musicapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NotSoSecret!
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d musicapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: soundboot-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/musicapp
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=NotSoSecret!
      - FFMPEG_PATH=ffmpeg
    volumes:
      - hls-data:/app/uploads/hls
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  hls-data:
