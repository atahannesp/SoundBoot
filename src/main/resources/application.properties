spring.application.name=musicapp

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/musicapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.mapper.accept-case-insensitive-enums=true

ffmpeg.path=${FFMPEG_PATH:ffmpeg}

# JWT Configuration
jwt.secret=${JWT_SECRET:default_jwt_secret_key_change_in_production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB